<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta Corporativa | AuditorIA</title>
    <meta name="description" content="Regístrate para obtener acceso a la suite forense fiscal.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="despertador.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-primary: #0F172A; --bg-secondary: #1E293B; --text-main: #F8FAFC; 
            --text-muted: #94A3B8; --border: rgba(255,255,255,0.1); 
            --brand: #3B82F6; --brand-glow: rgba(59, 130, 246, 0.4); --success: #10B981; --danger: #EF4444;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-primary); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}
        *, *::before, *::after { box-sizing: border-box; }
        
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; position: relative;}
        .login-wrapper::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.05; z-index: 0; pointer-events: none;}
        
        .login-card { position: relative; z-index: 1; width: 100%; max-width: 480px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.6); padding: 40px; }
        
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-title { font-size: 24px; font-weight: 900; margin: 0 0 10px 0; color: white; }
        .login-desc { font-size: 14px; color: var(--text-muted); margin: 0; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label { display: block; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .input-control { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); color: white; padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s;}
        .input-control:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); background: rgba(15, 23, 42, 0.9);}

        .btn-login { width: 100%; background: var(--success); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase;}
        .btn-login:hover { transform: translateY(-2px); background: #059669; box-shadow: 0 8px 25px rgba(16, 185, 129, 0.6); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        .login-footer { margin-top: 25px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px; }
        .register-link { color: var(--text-muted); font-size: 14px; }
        .register-link a { color: white; font-weight: bold; text-decoration: none; margin-left: 5px; transition: 0.2s; }
        .register-link a:hover { color: var(--brand); }

        #errorMsg { color: #FCA5A5; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; text-align: center;}
    </style>
</head>
<body>

    <script src="navbar.js"></script>
    
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Crear Cuenta</h1>
                <p class="login-desc">Regístrate para obtener tus primeros 3 análisis forenses gratuitos.</p>
            </div>

            <div id="errorMsg"></div>

            <form id="formRegistro">
                <div class="input-group">
                    <label class="input-label">Nombre Completo</label>
                    <input type="text" id="nombre" class="input-control" placeholder="Ej. Carlos Mendoza" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Correo Electrónico</label>
                    <input type="email" id="email" class="input-control" placeholder="ejemplo@empresa.com" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Contraseña</label>
                    <input type="password" id="password" class="input-control" placeholder="Crea una contraseña segura (mín. 6 caracteres)" required minlength="6">
                </div>

                <button type="submit" class="btn-login" id="btnSubmit">
                    REGISTRAR Y ACCEDER
                </button>
            </form>

            <div class="login-footer">
                <div class="register-link">
                    ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión aquí</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="footer.js"></script>

    <script>
        // CONEXIÓN MAESTRA A SUPABASE (Tus credenciales)
        const supabaseUrl = 'https://qhuctouhkxyqhdfwcctl.supabase.co';
        const supabaseKey = 'sb_publishable_sZyJooZmDdt6D7zcmftDew_YLtR6p7x'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // LÓGICA DE REGISTRO EN LA BASE DE DATOS
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nombre = document.getElementById('nombre').value;
            
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerHTML = `<svg style="animation: spin 1s linear infinite;" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> CREANDO CUENTA...`;
            btn.disabled = true;
            errorMsg.style.display = 'none';

            // Ejecuta el registro en la nube de Supabase
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: nombre // Guardamos el nombre en la base de datos
                    }
                }
            });

            if (error) {
                // Si falla (Ej. el correo ya existe, o la API Key era incorrecta)
                console.error("Error de Supabase:", error);
                errorMsg.innerText = error.message === "User already registered" ? "Este correo ya está registrado." : "Error: Verifica tu conexión o intenta con otra contraseña.";
                errorMsg.style.display = 'block';
                btn.innerHTML = "REGISTRAR Y ACCEDER";
                btn.disabled = false;
            } else {
                // Registro Exitoso: Le inyectamos sus 3 créditos locales
                localStorage.setItem('auditoria_creditos', '3');
                
                if(typeof window.showToast === 'function') {
                    window.showToast("Cuenta creada con éxito. Redirigiendo...", "success");
                }
                
                // Lo mandamos a la página principal del ecosistema
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);
            }
        });
    </script>
</body>
</html>
