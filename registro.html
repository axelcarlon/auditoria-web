<div id="errorMsg"></div>

            <form id="formRegistro" onsubmit="procesarRegistro(event)">
                <div class="input-group">
                    <label class="input-label">Nombre Completo</label>
                    <input type="text" id="nombre" class="input-control" placeholder="Ej. Carlos Mendoza" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Correo Electrónico</label>
                    <input type="email" id="email" class="input-control" placeholder="ejemplo@empresa.com" required>
                </div>
                <div class="input-group">
                    <label class="input-label">Contraseña</label>
                    <input type="password" id="password" class="input-control" placeholder="Crea una contraseña (mín. 6 caracteres)" required minlength="6">
                </div>

                <button type="submit" class="btn-login" id="btnSubmit">
                    REGISTRAR Y ACCEDER
                </button>
            </form>

            <div class="login-footer">
                <div class="register-link">
                    ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión aquí</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="footer.js"></script>

    <script>
        // CONEXIÓN A SUPABASE
        const supabaseUrl = 'https://qhuctouhkxyqhdfwcctl.supabase.co';
        const supabaseKey = 'sb_publishable_sZyJooZmDdt6D7zcmftDew_YLtR6p7x'; 
        let supabase;

        // Intentamos inicializar. Si la llave es incorrecta, lo sabremos.
        try {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            console.log("Motor de Base de Datos conectado.");
        } catch (error) {
            console.error("Fallo crítico al conectar Supabase:", error);
            document.getElementById('errorMsg').innerText = "Fallo de conexión con el servidor. Revisa la consola.";
            document.getElementById('errorMsg').style.display = 'block';
        }

        // LÓGICA DE REGISTRO BLINDADA
        async function procesarRegistro(e) {
            e.preventDefault(); // ESTO ES MAGIA: Evita que la página parpadee y se recargue
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nombre = document.getElementById('nombre').value;
            
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerHTML = `CREANDO CUENTA...`;
            btn.disabled = true;
            errorMsg.style.display = 'none';

            if (!supabase) {
                errorMsg.innerText = "La base de datos no está activa.";
                errorMsg.style.display = 'block';
                btn.innerHTML = "REGISTRAR Y ACCEDER";
                btn.disabled = false;
                return;
            }

            try {
                // Ejecuta el registro en la nube de Supabase
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { full_name: nombre }
                    }
                });

                if (error) {
                    throw error;
                }

                // REGISTRO EXITOSO
                localStorage.setItem('auditoria_creditos', '3');
                if(typeof window.showToast === 'function') {
                    window.showToast("Cuenta creada con éxito. Redirigiendo...", "success");
                }
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);

            } catch (error) {
                // SI ALGO FALLA, LO MUESTRA EN EL CUADRO ROJO
                console.error("Error de Registro:", error);
                
                let mensajeError = error.message;
                if (mensajeError.includes("User already registered")) mensajeError = "Este correo ya está registrado.";
                if (mensajeError.includes("API key")) mensajeError = "Error de API Key. Verifica tu llave pública de Supabase.";
                
                errorMsg.innerText = mensajeError;
                errorMsg.style.display = 'block';
                btn.innerHTML = "REGISTRAR Y ACCEDER";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
