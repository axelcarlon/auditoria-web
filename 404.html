<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruta no encontrada | AuditorIA</title>
    <meta name="robots" content="noindex, follow">
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KJW30G9ETZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KJW30G9ETZ');
    </script>
    <script src="despertador.js"></script>

    <style>
        :root { 
            --bg-primary: #0F172A; 
            --bg-secondary: #1E293B; 
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --border: rgba(255,255,255,0.1); 
            --brand: #3B82F6; 
            --brand-glow: rgba(59, 130, 246, 0.4);
        }
        
        body { margin: 0; padding: 0; background-color: var(--bg-primary); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}
        *, *::before, *::after { box-sizing: border-box; }
        
        /* Wrapper para centrar el contenido entre Nav y Footer */
        .content-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative;}
        
        /* Grid de fondo tecnológico sutil */
        .content-wrapper::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0; pointer-events: none;
        }

        .error-container { position: relative; z-index: 1; max-width: 550px; padding: 60px 40px; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        
        /* Animación suave de flotación */
        .icon-wrapper { width: 80px; height: 80px; background: rgba(59, 130, 246, 0.1); color: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); animation: float 3s ease-in-out infinite;}
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 28px; font-weight: 900; margin: 0 0 15px 0; letter-spacing: -0.5px; color: white; }
        p { font-size: 15px; color: var(--text-muted); margin: 0 0 40px 0; line-height: 1.6; }
        
        .btn-action { background: var(--brand); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--brand-glow); display: inline-flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; width: 100%;}
        .btn-action:hover { transform: translateY(-2px); background: #2563EB; box-shadow: 0 8px 25px var(--brand-glow); }
        
        .support-link { display: block; margin-top: 25px; color: var(--text-muted); font-size: 13px; text-decoration: none; transition: 0.2s;}
        .support-link:hover { color: var(--brand); text-decoration: underline;}

        @media (max-width: 768px) {
            .error-container { padding: 40px 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <script src="navbar.js"></script>
    
    <div class="content-wrapper">
        <div class="error-container">
            <div class="icon-wrapper">
                <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
            </div>
            
            <h1>Ups, expediente no localizado.</h1>
            <p>Parece que te desviaste del camino. La herramienta o página que buscas fue movida, o la URL no es correcta.</p>
            
            <a href="#" onclick="regresarSeguro(event)" class="btn-action">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Volver a la página anterior
            </a>
            
            <a href="index.html" class="support-link">O ir al Inicio del Ecosistema</a>
        </div>
    </div>
    
    <script src="footer.js"></script>
    
    <script>
        // Función Inteligente: Evalúa si hay historial para regresar, si no, manda a Home.
        function regresarSeguro(e) {
            e.preventDefault();
            if (window.history.length > 1 && document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
