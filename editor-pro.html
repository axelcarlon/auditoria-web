<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor PRO | AuditorIA PDF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --bg-base: #09090B;
            --bg-panel: #18181B;
            --bg-hover: #27272A;
            --border: #3F3F46;
            --brand: #E11D48;
            --accent: #3B82F6;
            --text-main: #F8FAFC;
            --text-muted: #A1A1AA;
            --canvas-bg: #111113;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; user-select: none;}
        body { background: var(--bg-base); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* =========================================
           TOPBAR
           ========================================= */
        .topbar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); border-bottom: 1px solid var(--border); height: 60px; padding: 0 20px; z-index: 100; flex-shrink: 0;}
        .topbar-left { display: flex; align-items: center; gap: 15px; }
        .btn-exit { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; text-decoration: none; transition: 0.2s;}
        .btn-exit:hover { border-color: var(--brand); color: white; }
        .logo-container { font-size: 18px; font-weight: 900; }
        .pro-badge { background: var(--brand); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px;}

        .topbar-center { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 8px; border: 1px solid var(--border); visibility: hidden;}
        .nav-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 5px; transition: 0.2s;}
        .nav-btn:hover { color: white; }
        .indicator { font-family: monospace; font-size: 13px; font-weight: bold; min-width: 60px; text-align: center; }

        .topbar-right { display: flex; align-items: center; gap: 15px; visibility: hidden;}
        .btn-undo { background: transparent; border: 1px solid var(--border); color: white; cursor: pointer; font-size: 12px; font-weight: bold; padding: 8px 15px; border-radius: 6px; transition: 0.2s;}
        .btn-undo:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
        .btn-undo:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-export { background: var(--brand); color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; text-transform: uppercase; transition: 0.2s;}
        .btn-export:hover { background: var(--brand-hover); box-shadow: 0 0 15px rgba(225, 29, 72, 0.4); }

        /* =========================================
           WORKSPACE & PANELS
           ========================================= */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        .sidebar-left { width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 10px; z-index: 50; overflow-y: auto;}
        .tool-btn { width: 44px; height: 44px; border-radius: 10px; background: transparent; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative;}
        .tool-btn:hover { color: white; background: var(--bg-hover); }
        .tool-btn.active { color: var(--accent); background: rgba(59, 130, 246, 0.1); border-color: var(--accent); }

        /* Tooltips Dinámicos CSS */
        .tool-btn::after { content: attr(data-tooltip); position: absolute; left: 55px; background: #000; border: 1px solid var(--border); color: white; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s; transform: translateX(-10px); z-index: 1000;}
        .tool-btn:hover::after { opacity: 1; transform: translateX(0); }
        .divider-h { width: 40px; height: 1px; background: var(--border); margin: 5px 0; }

        .canvas-area { flex: 1; background: var(--canvas-bg); overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 50px; position: relative;}
        
        .page-wrapper { position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin: 0 auto; transform-origin: top center; background: white;}
        #pdfCanvas { display: block; width: 100%; height: auto; }
        #interactiveLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }

        .sidebar-right { width: 300px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; gap: 20px; overflow-y: auto; z-index: 50; }
        .prop-section { display: flex; flex-direction: column; gap: 10px; }
        .prop-title { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin: 0; }
        
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: 0.1s;}
        .color-swatch.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.3);}
        
        .prop-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold;}
        .custom-slider { width: 100%; accent-color: var(--accent); }
        .custom-select { background: var(--bg-base); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; font-family: monospace; width: 100%; outline: none; }

        .btn-danger-outline { background: transparent; border: 1px dashed var(--danger); color: var(--danger); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; width: 100%; text-align: center;}
        .btn-danger-outline:hover:not(:disabled) { background: rgba(239, 68, 68, 0.1); border-style: solid;}
        .btn-danger-outline:disabled { border-color: var(--border); color: var(--border); cursor: not-allowed; }

        .btn-ocr { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; width: 100%; transition: 0.2s;}
        .btn-ocr:hover { background: #2563EB; }

        /* =========================================
           ELEMENTOS DOM (TEXTO, CAJAS, FIRMAS)
           ========================================= */
        .drag-element { position: absolute; transform: translate(-50%, -50%); cursor: grab; pointer-events: auto;}
        .drag-element:active { cursor: grabbing; }
        .drag-element.is-selected { z-index: 100; }
        .drag-element.is-selected::before { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border: 2px dashed var(--accent); pointer-events: none; }

        .el-text { font-family: 'Helvetica', Arial, sans-serif; white-space: pre; outline: none; cursor: text; line-height: 1.2; min-width: 10px; }
        .el-text:empty::after { content: 'Escribir...'; color: rgba(0,0,0,0.4); }
        
        .el-box { background: black; }
        .el-whiteout { background: white; border: 1px solid #E5E7EB; }
        .el-highlight { background: yellow; opacity: 0.4; mix-blend-mode: multiply; }
        .el-stamp { font-family: 'Courier New', monospace; font-weight: bold; border: 3px solid; padding: 5px 15px; border-radius: 8px; text-transform: uppercase; opacity: 0.8; transform: translate(-50%, -50%) rotate(-15deg) !important; background: rgba(255,255,255,0.7); }
        .el-image { background-size: 100% 100%; }

        #drawGuide { position: absolute; border: 1px dashed var(--accent); background: rgba(59, 130, 246, 0.2); pointer-events: none; display: none; z-index: 999; }

        /* =========================================
           SCREENS & MODALS
           ========================================= */
        #initScreen { position: absolute; top: 60px; left: 0; right: 0; bottom: 0; background: var(--bg-base); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        .upload-area { border: 2px dashed var(--border); padding: 60px; border-radius: 16px; text-align: center; cursor: pointer; background: var(--bg-panel); transition: 0.3s;}
        .upload-area:hover { border-color: var(--accent); transform: translateY(-5px);}
        
        #sysLoader { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: var(--accent); font-family: monospace; font-weight: bold;}
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Modal OCR Elegante */
        #ocrModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .ocr-content { background: var(--bg-panel); border: 1px solid var(--border); width: 600px; max-width: 90%; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px;}
        .ocr-textarea { width: 100%; height: 300px; background: var(--bg-base); color: var(--success); border: 1px solid var(--border); padding: 15px; border-radius: 8px; font-family: monospace; resize: none; outline: none; }

        /* Toasts Nivel Dios */
        #toastContainer { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 10000; pointer-events: none; }
        .toast { background: #000; border: 1px solid var(--border); border-left: 4px solid var(--success); color: white; padding: 15px 20px; border-radius: 8px; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: 0.3s; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--brand); }
        .toast.info { border-left-color: var(--accent); }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <a href="editor-pdf.html" class="btn-exit">Volver</a>
            <div class="logo-container">Editor <span class="pro-badge">PRO</span></div>
        </div>

        <div class="topbar-center" id="uiTopbarCenter">
            <button class="nav-btn" onclick="Workspace.zoomOut()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg></button>
            <span class="indicator zoom-val" id="lblZoom">100%</span>
            <button class="nav-btn" onclick="Workspace.zoomIn()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg></button>
            
            <div class="divider-v"></div>

            <button class="nav-btn" onclick="Workspace.prevPage()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg></button>
            <span class="indicator" id="lblPage">0 / 0</span>
            <button class="nav-btn" onclick="Workspace.nextPage()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg></button>
        </div>

        <div class="topbar-right" id="uiTopbarRight">
            <button class="btn-undo" id="btnUndo" onclick="History.undo()" disabled title="Ctrl + Z">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg> Deshacer
            </button>
            <button class="btn-undo" id="btnRedo" onclick="History.redo()" disabled title="Ctrl + Shift + Z">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path></svg> Rehacer
            </button>
            
            <div class="divider-v"></div>

            <button class="btn-export" onclick="ExportEngine.buildPDF()">
                Exportar PDF
            </button>
        </div>
    </header>

    <div id="initScreen">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <svg width="48" height="48" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom: 15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h2 style="margin: 0 0 10px;">Lienzo Forense</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin: 0;">Sube el PDF para iniciar el motor en RAM.</p>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        </div>
    </div>

    <div class="workspace" id="workspaceContainer" style="visibility: hidden;">
        
        <aside class="sidebar-left">
            <button class="tool-btn active" data-tool="select" data-tooltip="Cursor (V)" onclick="ToolManager.set('select')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            </button>
            <div class="divider-h"></div>
            
            <button class="tool-btn" data-tool="text" data-tooltip="Texto (T)" onclick="ToolManager.set('text')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <button class="tool-btn" data-tool="check" data-tooltip="Palomita" onclick="ToolManager.set('check')">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
            </button>
            <button class="tool-btn" data-tool="cross" data-tooltip="Tache" onclick="ToolManager.set('cross')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="divider-h"></div>
            
            <button class="tool-btn" data-tool="redact" data-tooltip="Censurar (Negro)" onclick="ToolManager.set('redact')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4h16v16H4z"></path></svg>
            </button>
            <button class="tool-btn" data-tool="whiteout" data-tooltip="Corrector Líquido" onclick="ToolManager.set('whiteout')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 00-2-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </button>
            <button class="tool-btn" data-tool="highlight" data-tooltip="Resaltador" onclick="ToolManager.set('highlight')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </button>
            
            <div class="divider-h"></div>

            <button class="tool-btn" data-tool="stamp" data-tooltip="Sellos" onclick="ToolManager.set('stamp')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            </button>
            <button class="tool-btn" data-tooltip="Insertar Imagen" onclick="document.getElementById('imgInput').click()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </button>
            <input type="file" id="imgInput" accept="image/png, image/jpeg" style="display:none;">
        </aside>

        <main class="canvas-area" id="scrollArea">
            <div class="page-wrapper" id="pageWrapper">
                <canvas id="pdfCanvas"></canvas>
                <div id="interactiveLayer"></div>
                <div id="drawGuide"></div>
            </div>
        </main>

        <aside class="sidebar-right">
            
            <div class="prop-section">
                <h4 class="prop-title">Apariencia</h4>
                <div class="color-grid">
                    <div class="color-swatch active" style="background: #000000;" data-color="#000000"></div>
                    <div class="color-swatch" style="background: #1E3A8A;" data-color="#1E3A8A"></div>
                    <div class="color-swatch" style="background: #2563EB;" data-color="#2563EB"></div>
                    <div class="color-swatch" style="background: #DC2626;" data-color="#DC2626"></div>
                    <div class="color-swatch" style="background: #16A34A;" data-color="#16A34A"></div>
                    <div class="color-swatch" style="background: #FBBF24;" data-color="#FBBF24"></div>
                    <div class="color-swatch" style="background: #FFFFFF; border: 1px solid #3F3F46;" data-color="#FFFFFF"></div>
                </div>

                <div class="prop-row" style="margin-top: 10px;">
                    <span>Tamaño Base</span>
                    <span class="prop-val" id="lblSize">14pt</span>
                </div>
                <input type="range" class="custom-slider" id="sliderSize" min="8" max="72" value="14">
            </div>

            <div class="prop-section" id="panelStamp" style="display: none; padding-top: 10px; border-top: 1px dashed var(--border);">
                <h4 class="prop-title">Macro de Sello</h4>
                <select id="stampText" class="custom-select">
                    <option value="AUDITADO">AUDITADO</option>
                    <option value="APROBADO">APROBADO</option>
                    <option value="CANCELADO">CANCELADO</option>
                    <option value="PAGADO">PAGADO</option>
                </select>
            </div>

            <div class="prop-section" style="padding-top: 10px; border-top: 1px dashed var(--border);">
                <h4 class="prop-title">Escáner IA</h4>
                <button class="btn-ocr" onclick="OCREngine.scan()">Extraer Texto (OCR)</button>
            </div>

            <div class="prop-section" style="padding-top: 10px; border-top: 1px dashed var(--border);">
                <h4 class="prop-title">Inspector</h4>
                <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; color: var(--text-muted);">
                    X: <span id="inspX">--</span> | Y: <span id="inspY">--</span>
                </div>
                <button class="btn-danger-outline" id="btnDelete" disabled onclick="ObjectManager.deleteSelected()">Eliminar Elemento</button>
            </div>
            
        </aside>
    </div>

    <div id="ocrModal">
        <div class="ocr-content">
            <h3 style="margin:0; font-size: 16px;">Texto Extraído (OCR)</h3>
            <textarea id="ocrOutput" class="ocr-textarea"></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-exit" onclick="document.getElementById('ocrModal').style.display='none'">Cerrar</button>
                <button class="btn-ocr" style="width: auto; padding: 10px 20px;" onclick="navigator.clipboard.writeText(document.getElementById('ocrOutput').value); Toast.show('Copiado al portapapeles', 'info');">Copiar Todo</button>
            </div>
        </div>
    </div>

    <div id="sysLoader">
        <div class="spinner"></div>
        <span id="loaderText">Iniciando Motor...</span>
    </div>
    <div id="toastContainer"></div>

    <script>
        const Toast = {
            show(msg, type = 'success') {
                const c = document.getElementById('toastContainer');
                const el = document.createElement('div');
                el.className = `toast ${type}`;
                let icon = type==='error'?'⚠️':type==='info'?'⚡':'✓';
                if(type === 'undo') icon = '↩';
                if(type === 'redo') icon = '↪';
                el.innerHTML = `<span style="font-size:16px;">${icon}</span> ${msg}`;
                c.appendChild(el);
                requestAnimationFrame(() => el.classList.add('show'));
                setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
            }
        };

        const Loader = {
            show(msg) { document.getElementById('loaderText').innerText = msg; document.getElementById('sysLoader').style.display = 'flex'; },
            hide() { document.getElementById('sysLoader').style.display = 'none'; }
        };

        // Estado Global PDF
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfBytes = null;
        let pdfProxy = null;
        let totalPages = 0;
        let currentPage = 1;
        let zoom = 1.0;
        
        // Memoria RAM de Objetos (Coordenadas Relativas Porcentuales)
        let DB = {}; 
        let historyStack = [];
        let redoStack = [];

        // UI State
        let currentTool = 'select';
        let currentProps = { color: '#000000', size: 14 };
        let selectedId = null;

        // Variables Drag/Draw
        let isDrawing = false;
        let isDragging = false;
        let startX = 0, startY = 0;
        let dragOffsetX = 0, dragOffsetY = 0;

        const layer = document.getElementById('interactiveLayer');
        const guide = document.getElementById('drawGuide');
        const wrapper = document.getElementById('pageWrapper');
        const canvas = document.getElementById('pdfCanvas');

        // ---------------------------------------------------------
        // INGESTA Y RENDERIZADO SEGURO
        // ---------------------------------------------------------
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file || file.type !== 'application/pdf') return Toast.show("Sube un PDF.", "error");

            Loader.show("Renderizando Vectores...");
            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    pdfBytes = this.result;
                    pdfProxy = await pdfjsLib.getDocument({data: new Uint8Array(pdfBytes)}).promise;
                    
                    totalPages = pdfProxy.numPages;
                    currentPage = 1;
                    DB = {}; historyStack = []; redoStack = [];
                    for(let i=1; i<=totalPages; i++) DB[i] = [];

                    document.getElementById('initScreen').style.display = 'none';
                    document.getElementById('workspaceContainer').style.visibility = 'visible';
                    document.getElementById('uiTopbarCenter').classList.add('visible');
                    document.getElementById('uiTopbarRight').classList.add('visible');

                    await Workspace.autoFit();
                    await Workspace.renderPage();
                    Toast.show("Documento listo en RAM.");
                    Loader.hide();
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                Loader.hide();
                Toast.show("Error al cargar PDF protegido.", "error");
            }
        });

        const Workspace = {
            async autoFit() {
                const p = await pdfProxy.getPage(1);
                const vp = p.getViewport({scale: 1.0});
                const containerW = document.getElementById('scrollArea').clientWidth;
                zoom = Math.min(Math.max(Math.round(((containerW - 100) / vp.width) * 4)/4, 0.5), 2.0);
                this.updateUI();
            },
            async zoomIn() { if(zoom < 3.0) { zoom += 0.25; this.updateUI(); await this.renderPage(); } },
            async zoomOut() { if(zoom > 0.5) { zoom -= 0.25; this.updateUI(); await this.renderPage(); } },
            async prevPage() { if(currentPage > 1) { currentPage--; ObjectManager.deselect(); await this.renderPage(); } },
            async nextPage() { if(currentPage < totalPages) { currentPage++; ObjectManager.deselect(); await this.renderPage(); } },
            updateUI() {
                document.getElementById('lblZoom').innerText = `${Math.round(zoom*100)}%`;
                document.getElementById('lblPage').innerText = `${currentPage} / ${totalPages}`;
            },
            async renderPage() {
                const p = await pdfProxy.getPage(currentPage);
                const vp = p.getViewport({scale: zoom});
                const scale = window.devicePixelRatio || 1;

                canvas.width = Math.floor(vp.width * scale);
                canvas.height = Math.floor(vp.height * scale);
                const cssW = Math.floor(vp.width) + "px";
                const cssH = Math.floor(vp.height) + "px";
                
                canvas.style.width = cssW; canvas.style.height = cssH;
                wrapper.style.width = cssW; wrapper.style.height = cssH;

                await p.render({ canvasContext: canvas.getContext('2d'), transform: scale !== 1 ? [scale,0,0,scale,0,0] : null, viewport: vp }).promise;
                
                ObjectManager.drawAll();
            }
        };

        // ---------------------------------------------------------
        // OCR MODAL ENGINE
        // ---------------------------------------------------------
        const OCREngine = {
            async scan() {
                Loader.show("Escaneando texto (OCR)...");
                try {
                    const page = await pdfProxy.getPage(currentPage);
                    const textContent = await page.getTextContent();
                    const text = textContent.items.map(i => i.str).join(' ');
                    document.getElementById('ocrOutput').value = text.trim() === '' ? 'No se detectó texto vivo.' : text;
                    document.getElementById('ocrModal').style.display = 'flex';
                } catch(e) {
                    Toast.show("Fallo en OCR.", "error");
                } finally { Loader.hide(); }
            }
        };

        // ---------------------------------------------------------
        // UI TOOLS & PROPERTIES
        // ---------------------------------------------------------
        const ToolManager = {
            set(t) {
                currentTool = t;
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const btn = document.querySelector(`.tool-btn[data-tool="${t}"]`);
                if(btn) btn.classList.add('active');
                
                document.getElementById('panelStamp').style.display = t === 'stamp' ? 'flex' : 'none';
                layer.style.cursor = (t==='select'||t==='image') ? 'default' : (t==='text' ? 'text' : 'crosshair');
                ObjectManager.deselect();
            }
        };

        document.querySelectorAll('.color-swatch').forEach(sw => {
            sw.onclick = () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                sw.classList.add('active');
                currentProps.color = sw.getAttribute('data-color');
                if(selectedId) ObjectManager.updateProp('color', currentProps.color);
            };
        });

        document.getElementById('sliderSize').oninput = (e) => {
            currentProps.size = parseInt(e.target.value);
            document.getElementById('lblSize').innerText = `${currentProps.size}pt`;
            if(selectedId) ObjectManager.updateProp('size', currentProps.size);
        };

        document.getElementById('imgInput').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                ObjectManager.create('image', 0.5, 0.5, 0, 0, {imgData: ev.target.result});
                ToolManager.set('select');
            };
            r.readAsDataURL(f);
        };

        // Shortcuts
        document.addEventListener('keydown', (e) => {
            if(e.target.isContentEditable || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if(e.key.toLowerCase() === 'v') ToolManager.set('select');
            if(e.key.toLowerCase() === 't') ToolManager.set('text');
            if((e.key === 'Delete' || e.key === 'Backspace') && selectedId) ObjectManager.deleteSelected();
            if(e.ctrlKey || e.metaKey) {
                if(e.key.toLowerCase() === 'z') { e.preventDefault(); e.shiftKey ? History.redo() : History.undo(); }
            }
        });

        // ---------------------------------------------------------
        // MOTOR DE DIBUJO Y ARRASTRE (PORCENTAJES RELATIVOS)
        // ---------------------------------------------------------
        layer.addEventListener('mousedown', (e) => {
            if(currentTool === 'select' || currentTool === 'image') return;
            if(e.target.closest('.drag-element')) return; 

            const r = layer.getBoundingClientRect();
            startX = e.clientX - r.left; startY = e.clientY - r.top;

            if(['redact', 'whiteout', 'highlight'].includes(currentTool)) {
                isDrawing = true;
                guide.style.left = startX + 'px'; guide.style.top = startY + 'px';
                guide.style.width = '0px'; guide.style.height = '0px';
                guide.style.backgroundColor = currentTool === 'redact' ? '#000' : currentTool === 'whiteout' ? '#FFF' : 'rgba(253,224,71,0.4)';
                guide.style.display = 'block';
            } else {
                // Convertir clic a porcentajes matemáticos (0.0 a 1.0)
                ObjectManager.create(currentTool, startX / r.width, startY / r.height);
            }
        });

        document.addEventListener('mousemove', (e) => {
            const r = layer.getBoundingClientRect();
            let curX = e.clientX - r.left; let curY = e.clientY - r.top;

            if(isDrawing) {
                const w = Math.abs(curX - startX); const h = Math.abs(curY - startY);
                guide.style.left = Math.min(curX, startX) + 'px';
                guide.style.top = Math.min(curY, startY) + 'px';
                guide.style.width = w + 'px'; guide.style.height = h + 'px';
            } 
            else if(isDragging && selectedId) {
                const el = document.getElementById(selectedId);
                if(el) {
                    let nx = curX - dragOffsetX; let ny = curY - dragOffsetY;
                    // Limitar dentro del lienzo
                    nx = Math.max(0, Math.min(nx, r.width));
                    ny = Math.max(0, Math.min(ny, r.height));
                    el.style.left = nx + 'px'; el.style.top = ny + 'px';
                    
                    // Actualizar Inspector visual (No guarda en RAM hasta soltar)
                    document.getElementById('inspX').innerText = Math.round((nx/r.width)*100) + '%';
                    document.getElementById('inspY').innerText = Math.round((ny/r.height)*100) + '%';
                }
            }
        });

        document.addEventListener('mouseup', () => {
            const r = layer.getBoundingClientRect();
            if(isDrawing) {
                isDrawing = false; guide.style.display = 'none';
                const w = parseFloat(guide.style.width); const h = parseFloat(guide.style.height);
                if(w > 10 || h > 10) {
                    const cx = parseFloat(guide.style.left) + (w/2);
                    const cy = parseFloat(guide.style.top) + (h/2);
                    // Guardamos en RAM como proporciones (0.0 a 1.0) para que resistan al zoom
                    ObjectManager.create(currentTool, cx/r.width, cy/r.height, w/r.width, h/r.height);
                }
                ToolManager.set('select');
            }
            if(isDragging && selectedId) {
                isDragging = false;
                const el = document.getElementById(selectedId);
                const obj = DB[currentPage].find(o => o.id === selectedId);
                if(obj && el) {
                    const newPx = parseFloat(el.style.left) / r.width;
                    const newPy = parseFloat(el.style.top) / r.height;
                    
                    if(Math.abs(obj.x - newPx) > 0.001 || Math.abs(obj.y - newPy) > 0.001) {
                        const oldObj = {...obj};
                        obj.x = newPx; obj.y = newPy;
                        History.add({ act: 'mod', p: currentPage, old: oldObj, new: {...obj} });
                    }
                }
            }
        });

        // ---------------------------------------------------------
        // 7. GESTIÓN DE OBJETOS EN RAM (CRUD PRO)
        // ---------------------------------------------------------
        const ObjectManager = {
            create(type, x, y, w=0, h=0, ext={}) {
                const id = 'obj_' + Math.random().toString(36).substr(2, 9);
                let obj = { id, type, x, y, w, h, color: currentProps.color, size: currentProps.size, text: '', img: ext.imgData||null };
                
                if(type==='text') obj.text = "";
                if(type==='check') { obj.text = "✓"; obj.size *= 1.5; }
                if(type==='cross') { obj.text = "✗"; obj.size *= 1.5; }
                if(type==='stamp') { obj.text = document.getElementById('stampText').value; obj.size *= 2; }
                if(type==='whiteout') { obj.type = 'redact'; obj.color = '#FFFFFF'; }

                DB[currentPage].push(obj);
                History.add({ act: 'add', p: currentPage, obj: {...obj} });
                
                this.drawAll();
                if(!['redact','highlight'].includes(type)) ToolManager.set('select');
                
                setTimeout(() => {
                    this.select(id);
                    if(type==='text') { const el = document.getElementById(id); if(el) el.focus(); }
                }, 10);
            },
            
            drawAll() {
                layer.innerHTML = '';
                const r = layer.getBoundingClientRect(); // Ancho real actual del canvas

                (DB[currentPage] || []).forEach(o => {
                    // Validar integridad matemática
                    if(isNaN(o.x) || isNaN(o.y)) return;

                    const el = document.createElement('div');
                    el.className = `drag-element el-${o.type}`;
                    el.id = o.id;
                    // Traducir porcentaje a pixeles de pantalla
                    el.style.left = (o.x * 100) + '%'; 
                    el.style.top = (o.y * 100) + '%';

                    if(['text','check','cross','stamp'].includes(o.type)) {
                        el.innerText = o.text; el.style.color = o.color; el.style.fontSize = (o.size * zoom) + 'px';
                        if(o.type==='text') {
                            el.contentEditable = true;
                            el.onblur = (e) => { 
                                const oldText = o.text; o.text = e.target.innerText; 
                                if(!o.text.trim()) this.deleteObj(o.id);
                                else if (oldText !== o.text) History.add({act:'mod', p:currentPage, old:{...o, text:oldText}, new:{...o}});
                            };
                            el.onmousedown = (e) => { if(el.classList.contains('is-selected')) e.stopPropagation(); };
                        }
                        if(o.type==='stamp') el.style.borderColor = o.color;
                    } 
                    else if(o.type==='redact' || o.type==='highlight') {
                        el.style.width = (o.w * 100) + '%'; 
                        el.style.height = (o.h * 100) + '%'; 
                        el.style.backgroundColor = o.color;
                        if(o.color === '#FFFFFF') el.style.border = '1px solid #E5E7EB';
                    }
                    else if(o.type==='image') {
                        el.style.backgroundImage = `url(${o.img})`;
                        el.style.width = (150 * (o.size/14)) + 'px'; el.style.height = (150 * (o.size/14)) + 'px';
                    }

                    // Arrastre Evento Individual
                    el.addEventListener('mousedown', (e) => {
                        if(currentTool !== 'select') return;
                        this.select(o.id);
                        isDragging = true;
                        const rc = el.getBoundingClientRect();
                        const cx = rc.left - r.left + (rc.width/2);
                        const cy = rc.top - r.top + (rc.height/2);
                        dragOffsetX = (e.clientX - r.left) - cx;
                        dragOffsetY = (e.clientY - r.top) - cy;
                    });

                    if(selectedId === o.id) el.classList.add('is-selected');
                    layer.appendChild(el);
                });
            },

            select(id) {
                this.deselect();
                selectedId = id;
                const el = document.getElementById(id);
                if(el) el.classList.add('is-selected');
                document.getElementById('btnDelete').disabled = false;
                
                const o = DB[currentPage].find(x => x.id === id);
                if(o) {
                    document.getElementById('sliderSize').value = o.type==='stamp' ? o.size/2 : (o.type==='check'||o.type==='cross'? o.size/1.5 : o.size);
                    document.getElementById('lblSize').innerText = document.getElementById('sliderSize').value + 'pt';
                    
                    document.querySelectorAll('.color-swatch').forEach(sw => {
                        sw.classList.remove('active');
                        if(sw.getAttribute('data-color') === o.color) sw.classList.add('active');
                    });
                    
                    document.getElementById('inspX').innerText = Math.round(o.x*100) + '%';
                    document.getElementById('inspY').innerText = Math.round(o.y*100) + '%';
                }
            },

            deselect() {
                selectedId = null;
                document.querySelectorAll('.drag-element').forEach(e => e.classList.remove('is-selected'));
                document.getElementById('btnDelete').disabled = true;
                document.getElementById('inspX').innerText = '--';
                document.getElementById('inspY').innerText = '--';
            },

            updateProp(prop, val) {
                if(!selectedId) return;
                const o = DB[currentPage].find(x => x.id === selectedId);
                if(!o) return;
                const oldObj = {...o};
                if(prop === 'color') o.color = val;
                if(prop === 'size') {
                    if(o.type==='check' || o.type==='cross') o.size = val * 1.5;
                    else if(o.type==='stamp') o.size = val * 2;
                    else o.size = val;
                }
                History.add({ act: 'mod', p: currentPage, old: oldObj, new: {...o} });
                this.drawAll();
            },

            deleteObj(id) {
                const o = DB[currentPage].find(x => x.id === id);
                if(o) History.add({ act: 'del', p: currentPage, obj: {...o} });
                DB[currentPage] = DB[currentPage].filter(x => x.id !== id);
                this.deselect(); this.drawAll();
            },

            deleteSelected() { if(selectedId) this.deleteObj(selectedId); }
        };

        // ---------------------------------------------------------
        // 8. TIME MACHINE (UNDO / REDO)
        // ---------------------------------------------------------
        const History = {
            add(item) {
                historyStack.push(item); redoStack = []; this.updateBtns();
            },
            async undo() {
                const i = historyStack.pop(); if(!i) return;
                if(i.act === 'add') DB[i.p] = DB[i.p].filter(x => x.id !== i.obj.id);
                else if(i.act === 'del') DB[i.p].push(i.obj);
                else if(i.act === 'mod') {
                    const idx = DB[i.p].findIndex(x => x.id === i.old.id);
                    if(idx !== -1) DB[i.p][idx] = {...i.old};
                }
                redoStack.push(i);
                await this.apply(i.p);
                Toast.show("Deshecho", "undo");
            },
            async redo() {
                const i = redoStack.pop(); if(!i) return;
                if(i.act === 'add') DB[i.p].push(i.obj);
                else if(i.act === 'del') DB[i.p] = DB[i.p].filter(x => x.id !== i.obj.id);
                else if(i.act === 'mod') {
                    const idx = DB[i.p].findIndex(x => x.id === i.new.id);
                    if(idx !== -1) DB[i.p][idx] = {...i.new};
                }
                historyStack.push(i);
                await this.apply(i.p);
                Toast.show("Rehecho", "redo");
            },
            async apply(p) {
                if(currentPage !== p) { currentPage = p; await Workspace.renderPage(); }
                else ObjectManager.drawAll();
                this.updateBtns();
            },
            updateBtns() {
                document.getElementById('btnUndo').disabled = historyStack.length === 0;
                document.getElementById('btnRedo').disabled = redoStack.length === 0;
            }
        };

        // ---------------------------------------------------------
        // 9. EXPORTADOR BINARIO PDF-LIB (SHIELD ACTIVO)
        // ---------------------------------------------------------
        function hex2rgb(hex) {
            hex = hex.replace('#', '');
            if(hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            return { r: parseInt(hex.substring(0,2), 16)/255, g: parseInt(hex.substring(2,4), 16)/255, b: parseInt(hex.substring(4,6), 16)/255 };
        }

        const ExportEngine = {
            async buildPDF() {
                Loader.show("Forzando Compilación Binaria...");
                try {
                    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytesOriginal);
                    const pages = pdfDoc.getPages();
                    
                    const fHelv = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
                    const fCour = await pdfDoc.embedFont(PDFLib.StandardFonts.CourierBold);
                    const fSym = await pdfDoc.embedFont(PDFLib.StandardFonts.ZapfDingbats); 

                    for(let i=1; i<=totalPages; i++) {
                        const objs = DB[i];
                        if(!objs || objs.length === 0) continue;

                        const pPdf = pages[i-1];
                        const { width: pW, height: pH } = pPdf.getSize();

                        for(let o of objs) {
                            try { // BLINDAJE EXTREMO POR CADA OBJETO
                                if(isNaN(o.x) || isNaN(o.y)) continue;

                                const c = hex2rgb(o.color || '#000000');
                                const pColor = PDFLib.rgb(c.r, c.g, c.b);
                                const pSize = parseFloat(o.size) || 14; 
                                
                                // Traducción matemática perfecta (Porcentajes a Puntos PDF)
                                const pdfX = o.x * pW;
                                const pdfY = pH - (o.y * pH); // Invierte eje Y

                                if(o.type === 'check') {
                                    const w = fSym.widthOfTextAtSize('4', pSize);
                                    pPdf.drawText('4', { x: pdfX - (w/2), y: pdfY - (pSize/3), size: pSize, font: fSym, color: pColor });
                                }
                                else if(o.type === 'cross') {
                                    const w = fSym.widthOfTextAtSize('8', pSize);
                                    pPdf.drawText('8', { x: pdfX - (w/2), y: pdfY - (pSize/3), size: pSize, font: fSym, color: pColor });
                                }
                                else if(o.type === 'text') {
                                    let safeText = o.text ? o.text.replace(/[^\x00-\xFF]/g, "") : ""; // Mata Emojis que crashean WinAnsi
                                    if(!safeText.trim()) continue;
                                    
                                    const lines = safeText.split('\n');
                                    lines.forEach((line, idx) => {
                                        if(!line) return;
                                        const w = fHelv.widthOfTextAtSize(line, pSize);
                                        pPdf.drawText(line, { x: pdfX - (w/2), y: pdfY - (pSize/3) - (idx * pSize * 1.2), size: pSize, font: fHelv, color: pColor });
                                    });
                                }
                                else if(o.type === 'stamp') {
                                    let textStr = o.text || "SELLO";
                                    const w = fCour.widthOfTextAtSize(textStr, pSize);
                                    pPdf.drawRectangle({ x: pdfX - (w/2) - 10, y: pdfY - (pSize/2) - 5, width: w + 20, height: pSize + 10, borderColor: pColor, borderWidth: 3, opacity: 0.8 });
                                    pPdf.drawText(textStr, { x: pdfX - (w/2), y: pdfY - (pSize/3), size: pSize, font: fCour, color: pColor, opacity: 0.8 });
                                }
                                else if(o.type === 'redact' || o.type === 'highlight') {
                                    const wPdf = o.w * pW; const hPdf = o.h * pH;
                                    pPdf.drawRectangle({
                                        x: pdfX - (wPdf/2), y: pdfY - (hPdf/2), width: wPdf, height: hPdf,
                                        color: pColor, opacity: o.type === 'highlight' ? 0.4 : 1.0,
                                        blendMode: o.type === 'highlight' ? PDFLib.BlendMode.Multiply : PDFLib.BlendMode.Normal
                                    });
                                }
                                else if(o.type === 'image' && o.img) {
                                    let embed = o.img.includes('png') ? await pdfDoc.embedPng(o.img) : await pdfDoc.embedJpg(o.img);
                                    // Cálculo de proporción de pantalla para no deformar en PDF
                                    const pInfo = await pdfProxy.getPage(i);
                                    const vBase = pInfo.getViewport({scale: 1.0});
                                    const htmlH = 150 * (pSize/14); 
                                    const pdfImgH = htmlH * (pH / vBase.height);
                                    const dims = embed.scaleToFit(9999, pdfImgH);

                                    pPdf.drawImage(embed, { x: pdfX - (dims.width/2), y: pdfY - (dims.height/2), width: dims.width, height: dims.height });
                                }
                            } catch(objError) {
                                console.warn("Objeto corrupto ignorado por el escudo de seguridad.");
                            }
                        }
                    }

                    const bytes = await pdfDoc.save();
                    saveAs(new Blob([bytes], {type: 'application/pdf'}), `AuditorIA_PRO_${Date.now()}.pdf`);
                    Toast.show("Documento descargado con éxito.", "success");

                } catch(e) {
                    console.error("Error crítico evitado:", e);
                    // FALLBACK: Si todo falla, descarga el original para no perder información
                    saveAs(new Blob([pdfBytesOriginal], {type: 'application/pdf'}), `Backup_Seguridad.pdf`);
                    Toast.show("Fallo evitado. Copia de seguridad descargada.", "warning");
                } finally {
                    Loader.hide();
                }
            }
        };

    </script>
