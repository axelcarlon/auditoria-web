<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | AuditorIA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="despertador.js"></script>

    <style>
        :root { --bg-primary: #0F172A; --bg-secondary: #1E293B; --text-main: #F8FAFC; --text-muted: #94A3B8; --brand: #06B6D4; --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; background-color: var(--bg-primary); color: var(--text-main); font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { background: var(--bg-secondary); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .auth-container h2 { margin: 0 0 10px; font-size: 24px; font-weight: 900; }
        .auth-container p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .input-group input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; box-sizing: border-box;}
        .input-group input:focus { border-color: var(--brand); }
        
        .btn-submit { background: var(--brand); color: #083344; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-bottom: 10px;}
        .btn-submit:hover:not(:disabled) { background: #0891B2; color: white; transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-resend { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 12px; width: 100%; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.3s; display: none;}
        .btn-resend:hover:not(:disabled) { background: rgba(255,255,255,0.05); color: white; }
        .btn-resend:disabled { opacity: 0.5; cursor: not-allowed; }

        .auth-links { margin-top: 20px; font-size: 13px; }
        .auth-links a { color: var(--brand); text-decoration: none; font-weight: bold; }
        .auth-links a:hover { text-decoration: underline; }
        
        /* Modificado para ocultarse por defecto y aparecer como caja de alerta */
        #status-msg { display: none; margin-top: 15px; font-size: 13px; font-weight: bold; padding: 12px; border-radius: 8px; border: 1px solid transparent; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Recuperar Acceso</h2>
        <p>Ingresa tu correo y te enviaremos un enlace para crear una nueva contraseña.</p>

        <div id="recoverForm">
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@empresa.com">
            </div>
            
            <button class="btn-submit" id="btnRecover">Enviar Enlace</button>
            <button class="btn-resend" id="btnResend" disabled>Reenviar enlace (30s)</button>
        </div>

        <div id="status-msg"></div>

        <div class="auth-links">
            <a href="/login.html">Volver al inicio de sesión</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = 'https://qhuctouhkxyqhdfwcctl.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFodWN0b3Voa3h5cWhkZndjY3RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzU5NTgsImV4cCI6MjA4ODQxMTk1OH0.PFgK9iodQzPjSzxgBOwxDQgfKQOd2sIKhGhZ29stdWE';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const btnRecover = document.getElementById('btnRecover');
            const btnResend = document.getElementById('btnResend');
            const emailInput = document.getElementById('email');
            const msg = document.getElementById('status-msg');

            let countdownInterval;

            btnRecover.addEventListener('click', procesarEnvio);
            btnResend.addEventListener('click', procesarEnvio);
            
            emailInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    procesarEnvio();
                }
            });

            function mostrarMensaje(texto, tipo) {
                msg.style.display = 'block';
                msg.innerText = texto;
                if(tipo === 'error') {
                    msg.style.color = '#FCA5A5';
                    msg.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                    msg.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                } else if(tipo === 'success') {
                    msg.style.color = '#10B981';
                    msg.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                    msg.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                } else {
                    msg.style.color = '#F59E0B';
                    msg.style.backgroundColor = 'rgba(245, 158, 11, 0.1)';
                    msg.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                }
            }

            async function procesarEnvio() {
                const email = emailInput.value.trim();

                if(!email) {
                    mostrarMensaje("Por favor, ingresa un correo electrónico válido.", "warning");
                    return;
                }

                btnRecover.disabled = true;
                btnRecover.innerText = "Verificando...";
                msg.style.display = "none"; // Ocultar mientras carga

                try {
                    // Forzamos explícitamente la URL absoluta
                    const redirectUrl = window.location.origin + '/restablecer.html';
                    
                    const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: redirectUrl,
                    });

                    if (error) throw error;

                    mostrarMensaje("¡Enlace enviado! Revisa tu bandeja de entrada o la carpeta de spam.", "success");
                    
                    btnRecover.style.display = "none";
                    btnResend.style.display = "block";
                    iniciarTemporizador();

                } catch(error) {
                    console.error(error);
                    if(error.message.includes("rate limit")) {
                        mostrarMensaje("Has solicitado demasiados enlaces. Espera un momento antes de volver a intentarlo.", "error");
                    } else {
                        mostrarMensaje("Error de conexión. Verifica que tu correo esté registrado e intenta de nuevo.", "error");
                    }
                    
                    btnRecover.disabled = false;
                    btnRecover.innerText = "Enviar Enlace";
                }
            }

            function iniciarTemporizador() {
                let segundos = 30;
                btnResend.disabled = true;
                
                clearInterval(countdownInterval);
                
                countdownInterval = setInterval(() => {
                    segundos--;
                    btnResend.innerText = `Reenviar enlace (${segundos}s)`;
                    
                    if(segundos <= 0) {
                        clearInterval(countdownInterval);
                        btnResend.innerText = "Enviar enlace de nuevo";
                        btnResend.disabled = false;
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
