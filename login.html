<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo | AuditorIA</title>
    <meta name="description" content="Inicia sesión en tu cuenta corporativa de AuditorIA. Acceso seguro al ecosistema forense fiscal.">
    <meta name="robots" content="noindex, follow">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://auditoriaxml.mx/login">
    <meta property="og:title" content="Acceso Corporativo | AuditorIA">
    <meta property="og:description" content="Inicia sesión en tu cuenta corporativa de AuditorIA. Acceso seguro al ecosistema forense fiscal.">
    <meta property="og:image" content="https://auditoriaxml.mx/portada-seo.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://auditoriaxml.mx/login">
    <meta name="twitter:title" content="Acceso Corporativo | AuditorIA">
    <meta name="twitter:description" content="Inicia sesión en tu cuenta corporativa de AuditorIA. Acceso seguro al ecosistema forense fiscal.">
    <meta name="twitter:image" content="https://auditoriaxml.mx/portada-seo.png">
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.ico">
    
    <script src="despertador.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-primary: #0F172A; 
            --bg-secondary: #1E293B; 
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --border: rgba(255,255,255,0.1); 
            --brand: #3B82F6; 
            --brand-glow: rgba(59, 130, 246, 0.4);
            --success: #10B981;
            --danger: #EF4444;
        }
        
        body { margin: 0; padding: 0; background-color: var(--bg-primary); color: var(--text-main); font-family: 'Inter', system-ui, sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;}
        *, *::before, *::after { box-sizing: border-box; }
        
        /* FIX MÓVIL APLICADO: overflow: hidden para cortar el fondo que rompía la pantalla */
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; position: relative; overflow: hidden; width: 100%;}
        .login-wrapper::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.05; z-index: 0; pointer-events: none;}
        .login-wrapper::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 60%); z-index: 0; pointer-events: none;}

        .login-card { position: relative; z-index: 1; width: 100%; max-width: 440px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.6); padding: 50px 40px; }
        
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-icon { width: 64px; height: 64px; background: rgba(59, 130, 246, 0.1); color: var(--brand); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);}
        .login-title { font-size: 26px; font-weight: 900; margin: 0 0 10px 0; letter-spacing: -0.5px; color: white; }
        .login-desc { font-size: 14px; color: var(--text-muted); margin: 0; }

        .input-group { margin-bottom: 25px; text-align: left; }
        .input-label { display: block; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-control { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); color: white; padding: 14px 16px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s;}
        .input-control:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); background: rgba(15, 23, 42, 0.9);}

        .form-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 13px; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; }
        .forgot-pwd { color: var(--brand); text-decoration: none; font-weight: 600; transition: 0.2s; }
        .forgot-pwd:hover { color: #60A5FA; text-decoration: underline; }

        .btn-login { width: 100%; background: var(--brand); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--brand-glow); display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-login:hover { transform: translateY(-2px); background: #2563EB; box-shadow: 0 8px 25px var(--brand-glow); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none;}

        .login-footer { margin-top: 30px; text-align: center; border-top: 1px solid var(--border); padding-top: 25px; }
        .register-link { color: var(--text-muted); font-size: 14px; }
        .register-link a { color: white; font-weight: bold; text-decoration: none; margin-left: 5px; transition: 0.2s; }
        .register-link a:hover { color: var(--brand); }

        .security-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; font-size: 11px; color: var(--success); font-weight: 700; letter-spacing: 0.5px; background: rgba(16, 185, 129, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2);}
        
        #errorMsg { color: #FCA5A5; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; text-align: center;}

        @media (max-width: 480px) {
            .login-card { padding: 40px 20px; }
            .form-actions { flex-direction: column; gap: 15px; align-items: flex-start;}
        }
    </style>
</head>
<body>

    <script src="navbar.js"></script>
    
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <div class="login-icon">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                </div>
                <h1 class="login-title">Acceso al Ecosistema</h1>
                <p class="login-desc">Ingresa tus credenciales corporativas para entrar al motor de auditoría forense.</p>
            </div>

            <div id="errorMsg"></div>

            <form id="formLogin">
                <div class="input-group">
                    <label class="input-label" for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="input-control" placeholder="ejemplo@empresa.com" required>
                </div>
                
                <div class="input-group">
                    <label class="input-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="input-control" placeholder="••••••••••••" required>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" checked style="accent-color: var(--brand);"> Recordar sesión
                    </label>
                    <a href="/recuperar.html" class="forgot-pwd">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login" id="btnSubmit">
                    Autenticar Credenciales
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                </button>
            </form>

            <div class="login-footer">
                <div class="register-link">
                    ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
                </div>
                <div class="security-badge">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    Conexión Cifrada & Zero-Trust
                </div>
            </div>

        </div>
    </div>
    
    <script src="footer.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('formLogin');
            const errorMsg = document.getElementById('errorMsg');
            let supabase;

            // 1. INICIALIZAR SUPABASE
            try {
                const supabaseUrl = 'https://qhuctouhkxyqhdfwcctl.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFodWN0b3Voa3h5cWhkZndjY3RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzU5NTgsImV4cCI6MjA4ODQxMTk1OH0.PFgK9iodQzPjSzxgBOwxDQgfKQOd2sIKhGhZ29stdWE'; 
                
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            } catch (err) {
                errorMsg.innerText = "Error cargando los servicios. Verifica tu conexión.";
                errorMsg.style.display = 'block';
            }

            // 2. LÓGICA DE INICIO DE SESIÓN
            form.addEventListener('submit', async (e) => {
                e.preventDefault(); 

                if (!supabase) return;

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const btn = document.getElementById('btnSubmit');
                const originalText = btn.innerHTML;

                // Animación de carga
                btn.innerHTML = `<svg style="animation: spin 1s linear infinite;" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> VERIFICANDO ENCRIPTACIÓN...`;
                btn.disabled = true;
                errorMsg.style.display = 'none';

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) throw error;

                    if(typeof window.showToast === 'function') {
                        window.showToast("Acceso Autorizado. Iniciando sistema...", "success");
                    }
                    
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 1000);

                } catch (error) {
                    console.error("Fallo de Login:", error);
                    
                    let msj = error.message;
                    if (msj === "Invalid login credentials") msj = "Correo o contraseña incorrectos.";
                    if (msj === "Email not confirmed") msj = "Por favor confirma tu correo electrónico primero.";

                    errorMsg.innerText = msj;
                    errorMsg.style.display = 'block';
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
