<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Contraseña | AuditorIA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="despertador.js"></script>

    <style>
        :root { --bg-primary: #0F172A; --bg-secondary: #1E293B; --text-main: #F8FAFC; --text-muted: #94A3B8; --brand: #06B6D4; --border: rgba(255,255,255,0.1); }
        body { margin: 0; padding: 0; background-color: var(--bg-primary); color: var(--text-main); font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { background: var(--bg-secondary); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .auth-container h2 { margin: 0 0 10px; font-size: 24px; font-weight: 900; }
        .auth-container p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .input-group input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; box-sizing: border-box;}
        .input-group input:focus { border-color: var(--brand); }
        
        /* Mensajes de validación en vivo */
        .password-hint { font-size: 11px; color: var(--text-muted); text-align: left; margin-top: -10px; margin-bottom: 15px; }
        .validation-error { color: #EF4444; font-size: 12px; text-align: left; font-weight: bold; margin-top: -10px; margin-bottom: 15px; display: none; }
        
        .btn-submit { background: var(--brand); color: #083344; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-submit:hover:not(:disabled) { background: #0891B2; color: white; transform: translateY(-2px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        #status-msg { display: none; margin-top: 20px; font-size: 13px; font-weight: bold; padding: 12px; border-radius: 8px; border: 1px solid transparent; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Nueva Contraseña</h2>
        <p>Ingresa tu nueva contraseña corporativa para AuditorIA.</p>

        <div id="resetForm">
            <div class="input-group">
                <label>Nueva Contraseña</label>
                <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres">
            </div>
            
            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite la contraseña">
            </div>

            <div class="password-hint" id="pwdHint">* La contraseña debe tener al menos 6 caracteres.</div>
            <div class="validation-error" id="valError">⚠️ Las contraseñas no coinciden.</div>

            <button class="btn-submit" id="btnReset" onclick="actualizarContrasena()">Actualizar Contraseña</button>
        </div>

        <div id="status-msg"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qhuctouhkxyqhdfwcctl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFodWN0b3Voa3h5cWhkZndjY3RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzU5NTgsImV4cCI6MjA4ODQxMTk1OH0.PFgK9iodQzPjSzxgBOwxDQgfKQOd2sIKhGhZ29stdWE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const pass1 = document.getElementById('newPassword');
        const pass2 = document.getElementById('confirmPassword');
        const valError = document.getElementById('valError');
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('btnReset');

        // Validación en tiempo real (al escribir)
        function checkLiveValidation() {
            if (pass2.value.length > 0 && pass1.value !== pass2.value) {
                valError.style.display = 'block';
                valError.innerText = '⚠️ Las contraseñas no coinciden.';
            } else {
                valError.style.display = 'none';
            }
        }

        pass1.addEventListener('input', checkLiveValidation);
        pass2.addEventListener('input', checkLiveValidation);

        // Permitir "Enter" para activar el botón
        pass2.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') actualizarContrasena();
        });

        function mostrarMensaje(texto, tipo) {
            msg.style.display = 'block';
            msg.innerText = texto;
            if(tipo === 'error') {
                msg.style.color = '#FCA5A5';
                msg.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                msg.style.borderColor = 'rgba(239, 68, 68, 0.3)';
            } else if(tipo === 'success') {
                msg.style.color = '#10B981';
                msg.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                msg.style.borderColor = 'rgba(16, 185, 129, 0.3)';
            }
        }

        async function actualizarContrasena() {
            const p1 = pass1.value;
            const p2 = pass2.value;

            // Validaciones previas
            if (p1.length < 6) {
                valError.style.display = 'block';
                valError.innerText = '⚠️ La contraseña es demasiado corta (min. 6 caracteres).';
                return;
            }

            if (p1 !== p2) {
                valError.style.display = 'block';
                valError.innerText = '⚠️ Las contraseñas no coinciden.';
                return;
            }

            valError.style.display = 'none';
            btn.disabled = true;
            btn.innerText = "Actualizando bóveda...";
            msg.style.display = "none";

            try {
                // Supabase lee mágicamente el token gigante oculto en la URL y sabe a quién pertenece
                const { data, error } = await supabase.auth.updateUser({
                    password: p1
                });

                if (error) throw error;

                // Éxito Total
                mostrarMensaje("¡Contraseña actualizada exitosamente! Redirigiendo al sistema...", "success");
                btn.style.display = "none";
                
                // Forzamos cierre de sesión para que el usuario entre desde cero por seguridad
                await supabase.auth.signOut();
                
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2500);

            } catch (error) {
                console.error(error);
                btn.disabled = false;
                btn.innerText = "Actualizar Contraseña";

                if (error.message.includes("Auth session missing")) {
                    mostrarMensaje("Acceso denegado. Este enlace ya caducó o es inválido. Ve al inicio de sesión y solicita uno nuevo.", "error");
                } else {
                    mostrarMensaje("Error: " + error.message, "error");
                }
            }
        }
    </script>
</body>
</html>
